name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write  # needed to create the GitHub Release, upload assets, and push the tag

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Lint workflow and compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # need full tag history for compute-version.sh

      - name: Lint workflows
        uses: raven-actions/actionlint@v2

      - name: Compute next version
        id: compute
        run: |
          version=$(bash scripts/compute-version.sh)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Next version: $version"

  test:
    name: Run tests
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test --nologo

  release:
    name: Build and release ${{ matrix.rid }}
    needs: [prepare, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            archive: tar.gz
          - rid: linux-arm64
            runner: ubuntu-latest
            archive: tar.gz
          - rid: osx-x64
            runner: macos-latest
            archive: tar.gz
          - rid: osx-arm64
            runner: macos-latest
            archive: tar.gz
          - rid: win-x64
            runner: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish CLI
        shell: bash
        run: |
          dotnet publish src/Pumex.Cli -c Release -r ${{ matrix.rid }} \
            --self-contained -p:PublishSingleFile=true \
            -p:Version=${{ needs.prepare.outputs.version }} \
            -o publish/${{ matrix.rid }}

      - name: Publish daemon
        shell: bash
        run: |
          dotnet publish src/Pumex.Daemon -c Release -r ${{ matrix.rid }} \
            --self-contained -p:PublishSingleFile=true \
            -p:Version=${{ needs.prepare.outputs.version }} \
            -o publish/${{ matrix.rid }}

      # Asset names omit the tag so the install scripts can resolve them via
      # the GitHub /releases/latest/download/<name> shortcut.
      - name: Stage binaries (POSIX)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p stage
          cp publish/${{ matrix.rid }}/pumex stage/
          cp publish/${{ matrix.rid }}/pumex-daemon stage/
          chmod +x stage/pumex stage/pumex-daemon
          tar -czf pumex-${{ matrix.rid }}.tar.gz -C stage .

      - name: Stage binaries (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force stage | Out-Null
          Copy-Item publish/${{ matrix.rid }}/pumex.exe stage/
          Copy-Item publish/${{ matrix.rid }}/pumex-daemon.exe stage/
          Compress-Archive -Path stage/* -DestinationPath "pumex-${{ matrix.rid }}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: |
            pumex-${{ matrix.rid }}.tar.gz
            pumex-${{ matrix.rid }}.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
